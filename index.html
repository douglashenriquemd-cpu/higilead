<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Higilead</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav>
      <div class="logo">Higilead</div>
      <a href="#contato" class="btn-nav">Falar com especialista</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Transforme seus leads em clientes</h1>
      <p>Solução completa para gestão e qualificação de leads com inteligência.</p>
      <a href="#contato" class="btn-primary">Quero saber mais</a>
    </section>

    <section id="contato" class="contato">
      <h2>Fale conosco</h2>
      <form>
        <input type="text" placeholder="Seu nome" required />
        <input type="email" placeholder="Seu e-mail" required />
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Higilead. Todos os direitos reservados.</p>
  </footer>
</body>
</html>
